<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{

    min-height:100vh;

    background:linear-gradient(-45deg,#001F54,#034078,#1282A2,#00B4D8,#48CAE4);

    background-size:400% 400%;

    animation:bgMove 12s ease infinite;

}

@keyframes bgMove{

    0%{background-position:0% 50%;}

    50%{background-position:100% 50%;}

    100%{background-position:0% 50%;}

}

.navbar{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:75px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 60px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border-bottom:1px solid rgba(255,255,255,.2);

}

.logo{

    color:white;

    font-size:28px;

    font-weight:700;

}

nav{

    display:flex;

    gap:15px;

}

nav a{

    color:white;

    text-decoration:none;

    padding:10px 18px;

    border-radius:30px;

    transition:.3s;

}

nav a:hover{

    background:white;

    color:#1565C0;

}

.active{

    background:white;

    color:#1565C0;

}

</style>

</head>

<body>

<header class="navbar">

    <div class="logo">
        PORTFOLIO
    </div>

    <nav>

        <a href="index.html" class="active">หน้าหลัก</a>

        <a href="about.html">ประวัติส่วนตัว</a>

        <a href="education.html">ประวัติการศึกษา</a>

        <a href="portfolio.html">ผลงาน</a>

        <a href="contact.html">ช่องทางการติดต่อ</a>

    </nav>

</header>

</body>
</html>
