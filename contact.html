*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(-45deg,#001F54,#034078,#0466C8,#0096C7,#48CAE4,#90E0EF);
    background-size:600% 600%;
    animation:bgMove 15s ease infinite;
    color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:18px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
}

.logo{
    font-size:28px;
    font-weight:700;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:18px;
    padding:10px 18px;
    border-radius:30px;
    transition:.3s;
}

nav a:hover,
.active{
    background:white;
    color:#1565C0;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding-top:80px;
}

.card{
    width:700px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.card h1{
    text-align:center;
    margin-bottom:30px;
}

.contact-item{
    background:rgba(255,255,255,.12);
    border-radius:12px;
    padding:15px 20px;
    margin-bottom:15px;
    font-size:18px;
    transition:.3s;
}

.contact-item:hover{
    transform:translateX(8px);
    background:rgba(255,255,255,.20);
}

strong{
    color:#E3F2FD;
}

@media(max-width:768px){

.card{
    width:90%;
}

.navbar{
    flex-direction:column;
    padding:15px;
}

nav{
    margin-top:10px;
}

}

</style>
